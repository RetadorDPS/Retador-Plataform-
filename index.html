<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <!-- interactive-widget=resizes-content (estándar W3C): al abrir el teclado el
         navegador ENCOGE el área visible, así el input del chat (al final de un
         flex-column de 100dvh) queda justo encima del teclado en CUALQUIER teléfono,
         sin JS ni ajustes por dispositivo. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content" />
    <title>RETADOR</title>

    <!-- PWA: manifest + tema oscuro + íconos. Rutas relativas: la app vive en un
         subdirectorio de GitHub Pages (/Retador-Plataform-/). -->
    <!-- ?v=13: rompe la caché del manifest viejo (fullscreen) que el service worker
         antiguo servía al reinstalar; así la instalación SIEMPRE lee este manifest
         (standalone, con reloj y barra de estado visibles). -->
    <link rel="manifest" href="manifest.webmanifest?v=14" />
    <!-- Color inicial de las barras del sistema (pantalla de inicio, oscura).
         La app lo actualiza por JS en cada cambio de tema (claro/oscuro). -->
    <meta name="theme-color" content="#080808" />
    <link rel="icon" type="image/png" href="icons/icon-192.png" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RETADOR" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
