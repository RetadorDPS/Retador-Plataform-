<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>RETADOR</title>

    <!-- PWA: manifest + tema oscuro + íconos. Rutas relativas: la app vive en un
         subdirectorio de GitHub Pages (/Retador-Plataform-/). -->
    <link rel="manifest" href="manifest.webmanifest" />
    <!-- Color inicial de las barras del sistema (pantalla de inicio, oscura).
         La app lo actualiza por JS en cada cambio de tema (claro/oscuro). -->
    <meta name="theme-color" content="#080808" />
    <!-- Arranque: pinta el fondo del tema guardado al instante, para que el
         refresco al cambiar de tema no parpadee de un color a otro. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("retador_theme") || "auto";
          var dark = t === "dark" || (t === "auto" && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
          var bg = dark ? "#080808" : "#FFFFFF";
          document.documentElement.style.background = bg;
        } catch (e) {}
      })();
    </script>
    <link rel="icon" type="image/png" href="icons/icon-192.png" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RETADOR" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
