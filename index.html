<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>RETADOR</title>

    <!-- PWA: manifest + tema oscuro + íconos. Rutas relativas: la app vive en un
         subdirectorio de GitHub Pages (/Retador-Plataform-/). -->
    <link rel="manifest" href="manifest.webmanifest" />
    <!-- Color de la barra del sistema. CLAVE: se fija UNA sola vez, aquí al
         arrancar (nunca en caliente). En MIUI/HyperOS, cambiar este color con la
         app ya abierta deja una raya fija bajo la barra de estado; fijarlo una vez
         al cargar NO la deja. Por eso, cuando el usuario cambia de tema, la app se
         vuelve a montar (recarga) y este arranque fija el color del nuevo tema
         limpio, como al abrir la app. -->
    <meta name="theme-color" content="#080808" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("retador_theme") || "auto";
          var dark = t === "dark" || (t === "auto" && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
          var bg = dark ? "#080808" : "#FFFFFF";
          document.documentElement.style.background = bg;
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute("content", bg);
        } catch (e) {}
      })();
    </script>
    <link rel="icon" type="image/png" href="icons/icon-192.png" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RETADOR" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
