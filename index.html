<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>RETADOR</title>

    <!-- PWA: manifest + tema oscuro + íconos. Rutas relativas: la app vive en un
         subdirectorio de GitHub Pages (/Retador-Plataform-/). -->
    <link rel="manifest" href="manifest.webmanifest" />
    <!-- Color de las barras del sistema = modo claro/oscuro del TELÉFONO, de forma
         NATIVA (dos metas con media-query). El navegador elige la que toca; NUNCA
         lo cambiamos por JavaScript. Ese cambio en caliente era lo que en
         MIUI/HyperOS dejaba una raya fija bajo la barra de estado. Al no tocarlo
         nunca, la raya no puede aparecer. -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#FFFFFF" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#080808" />
    <link rel="icon" type="image/png" href="icons/icon-192.png" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RETADOR" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
