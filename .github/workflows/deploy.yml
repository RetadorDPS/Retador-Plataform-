name: Deploy to GitHub Pages

# Publica la app en GitHub Pages cada vez que se suben cambios a la rama principal.
on:
  push:
    branches:
      - main
  workflow_dispatch:

# Permisos necesarios para que la Action pueda publicar en Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Permite un solo despliegue a la vez (cancela los antiguos en cola).
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
